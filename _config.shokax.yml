alternate: "Lyric's Space"
darkmode: false

# 开启平滑自动滚动与页面切换加载动画
auto_scroll: true
loader:
  start: true # 进入页面时显示加载动画
  switch: true # 切换页面时显示加载动画

# 配置默认背景音乐列表 (Meting API 自动解析)
audio:
  - title: "Love Story"
    list:
      - "https://music.163.com/#/song?id=19292984"

# 侧边栏与个人头像设置
sidebar:
  position: left
  avatar: avatar.jpg # 在 source/avatar.jpg 放置头像
